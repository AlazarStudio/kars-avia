server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Загруженные файлы — фото отелей TravelLine, документы — идут на backend
    location /uploads/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — все пути отдаём через index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статических ресурсов Vite (хэш в имени файла)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Отключаем кэш для index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
